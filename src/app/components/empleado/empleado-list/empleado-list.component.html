<div class="panel-header panel-header-sm">
</div>
<div class="main-content">
    <div class="row">
        <div class="col-md-12">

            <div class="card">
                <div class="card-header">
                    <h5 class="title">Empleados</h5>
                    <form>
                        <div class="form-group form-inline">
                            <input class="form-control ml-2" placeholder="Buscar..." type="text" id="search-text" aria-describedby="search-text" [(ngModel)]="searchText" autofocus>
                        </div>
                    </form>
                </div>
                <div class="card-body">
                    <div class="table-wrapper-scroll-y my-custom-scrollbar">
                        <table class="table table-striped table-hover mb-0">
                            <thead class=" text-primary">
                                <th>#</th>
                                <th>DNI</th>
                                <th>Antiguedad</th>
                                <th>Puesto</th>
                                <th>Categoria</th>
                                <th>Accion</th>
                            </thead>
                            <tbody>
                                <tr *ngFor="let empleado of empleados | appFilter: searchText; let i = index" (click)="setActive(empleado,i);" [class.table-active]="i == currentIndex">
                                    <td>{{empleado.apellido}} {{empleado.nombre}}</td>
                                    <td>{{empleado.dni}}</td>
                                    <td>
                                        <app-antiguedad [fechaIn]="empleado.fechaAlta"></app-antiguedad>
                                    </td>
                                    <td>{{empleado.puesto.nombre}}</td>
                                    <td>{{empleado.categoria.nombre}}</td>
                                    <td> <a routerLink="{{empleado.idPersona}}">Edit</a></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>


</div>

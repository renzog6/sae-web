<!-- Main Sidebar Container -->
<aside class="main-sidebar sidebar-dark-primary elevation-4">
    <!-- Brand Logo -->
    <a href="./" class="brand-link elevation-4">
        <img src="assets/img/logo_R_SAE.jpg" alt="Sistema Adaministracion de Eempresas" class="brand-image img-circle elevation-3" style="opacity: .8">
        <span class="brand-text font-weight-light">S A E</span>
    </a>

    <!-- Sidebar -->
    <div class="sidebar">
        <!-- Sidebar user (optional) -->
        <div class="user-panel mt-3 pb-3 mb-3 d-flex">
            <div class="image">
                <img src="assets/img/logo_R_SAE.jpg" class="img-circle elevation-2" alt="User Image">
            </div>
            <div class="info">
                <a href="#" class="d-block">Usuario X</a>
            </div>
        </div>

        <!-- Sidebar Menu -->
        <nav class="mt-2">
            <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">
                <!-- Add icons to the links using the .nav-icon class
               with font-awesome or any other icon font library -->
                <li class="nav-item has-treeview">
                    <a href="#" class="nav-link">
                        <i class="nav-icon fas fa-tachometer-alt"></i>
                        <p>
                            Empresas
                            <i class="right fas fa-angle-left"></i>
                        </p>
                    </a>
                    <ul class="nav nav-treeview">
                        <li class="nav-item">
                            <a routerLink="empresas" class="nav-link" routerLinkActive="active">
                                <i class="far fa-circle nav-icon"></i>
                                <p>Empresas</p>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a routerLink="contactos" class="nav-link" routerLinkActive="active">
                                <i class="far fa-circle nav-icon"></i>
                                <p>Contactos</p>
                            </a>
                        </li>
                    </ul>
                </li>

                <li class="nav-item">
                    <a routerLink="empleados" class="nav-link">
                        <i class="fas fa-users nav-icon"></i>
                        <p>Empleados</p>
                    </a>
                </li>
            </ul>

            <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">
                <li class="nav-item">
                    <a class="nav-link" [routerLink]="'/'" routerLinkActive="active">
                        <i class="far fa-circle nav-icon"></i>
                        <p>Home</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" [routerLink]="'/empleados'" routerLinkActive="active">
                        <i class="far fa-circle nav-icon"></i>
                        <p>Empleados</p>
                    </a>
                </li>
            </ul>
        </nav>
        <!-- /.sidebar-menu -->
    </div>
    <!-- /.sidebar -->
</aside>

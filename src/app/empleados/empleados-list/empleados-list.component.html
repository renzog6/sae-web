<div class="container-fluid">

    <div class="container-botones">
        <ul class="nav nav-pills">
            <li class="nav-item">
                <h4><strong>Empleandos</strong></h4>
            </li>
            <li class="nav-item">
                <button type="button" class="btn btn-outline-warning btn-sm">Agregar</button>
            </li>
            <li class="nav-item">
                <button type="button" class="btn btn-outline-warning btn-sm">Primary</button>
            </li>
            <li class="nav-item">
                <div class="btn-group">
                    <button type="button" class="btn btn-outline-warning btn-sm">Filtrado por:&nbsp;&nbsp;</button>
                    <select id="filtro" class="btn btn-warning  btn-sm dropdown-toggle" [(ngModel)]="filtro" (change)="cambioFiltro()">
                        <option value="0" selected>Todo</option>
                        <option value="1">Filtro 1</option>
                        <option value="2">Filtro 2</option>
                        <option value="3">Filtro 3</option>
                    </select>
                </div>
            </li>
        </ul>
    </div>

    <table class="table table-striped table-bordered table-sm row-border hover table-sm" datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger">

        <thead>
            <tr>
                <th class="align-middle" rowspan="1" colspan="1">Empleado</th>
                <th rowspan="1" colspan="1">Puesto</th>
                <th rowspan="1" colspan="1">CUIL</th>
                <th rowspan="1" colspan="1">Fecha</th>
                <th rowspan="1" colspan="1">Categoria</th>
                <th rowspan="1" colspan="1">Action</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let e of empleados">
                <td>{{e.getFullName()}}</td>
                <td>{{e.puesto.nombre}}</td>
                <td>{{e.cuil}}</td>
                <td>{{e.cuil}}</td>
                <td>{{e.categoria}}</td>
                <td>
                    <a [routerLink]="['/empleados/detail', e.id]">VER</a>
                </td>
            </tr>
        </tbody>
    </table>

</div>
